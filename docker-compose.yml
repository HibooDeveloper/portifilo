services:
  # ── Flask App ──────────────────────────────────────────────
  app:
    build: .
    container_name: portfolio_app
    restart: always
    env_file: .env
    environment:
      - FLASK_ENV=production
    # Create DB tables on startup, then run gunicorn. Idempotent (safe to repeat).
    command: ["sh", "-c", "python manage.py db-init && exec gunicorn --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 60 --keep-alive 5 --access-logfile /app/logs/access.log --error-logfile /app/logs/error.log wsgi:app"]
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [portfolio_net]
    expose: ["8000"]

  # ── Celery Worker ─────────────────────────────────────────
  celery:
    build: .
    container_name: portfolio_celery
    restart: always
    env_file: .env
    command: celery -A wsgi:celery_app worker --loglevel=info --concurrency=4
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on: [app, redis, db]
    networks: [portfolio_net]

  # ── Celery Beat (scheduler) ───────────────────────────────
  celery_beat:
    build: .
    container_name: portfolio_beat
    restart: always
    env_file: .env
    command: celery -A wsgi:celery_app beat --loglevel=info
    depends_on: [celery]
    networks: [portfolio_net]

  # ── MySQL ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: portfolio_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [portfolio_net]
    expose: ["3306"]

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [portfolio_net]
    expose: ["6379"]

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    # Custom image bakes in nginx config + static assets (no host bind-mounts),
    # and self-bootstraps a temporary TLS cert so it can start before certbot
    # has issued the real one. See nginx/Dockerfile + nginx/entrypoint.sh.
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: portfolio_nginx
    container_name: portfolio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt
      - uploads:/app/uploads:ro
    depends_on: [app]
    networks: [portfolio_net]

  # ── Certbot ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: portfolio_certbot
    depends_on: [nginx]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # On first start (no real cert yet): wait for nginx to serve :80, drop the
    # self-signed placeholder, then request the real cert via the HTTP-01
    # challenge. Afterwards loop `certbot renew` every 12h. nginx reloads itself
    # within ~60s of the cert changing (see nginx/entrypoint.sh).
    entrypoint: /bin/sh -c "D=hibbo.tech; if [ ! -f /etc/letsencrypt/renewal/$$D.conf ]; then rm -rf /etc/letsencrypt/live/$$D /etc/letsencrypt/archive/$$D; n=0; until [ -f /etc/letsencrypt/renewal/$$D.conf ] || [ $$n -ge 10 ]; do n=$$((n+1)); echo \"[certbot] issuance attempt $$n\"; certbot certonly --webroot -w /var/www/certbot --non-interactive --agree-tos --email admin@$$D --rsa-key-size 4096 -d $$D -d www.$$D || true; [ -f /etc/letsencrypt/renewal/$$D.conf ] || sleep 30; done; fi; trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  mysql_data: {}
  redis_data: {}
  uploads:    {}
  logs:       {}
  certbot_www: {}
  certbot_conf: {}

networks:
  portfolio_net:
    driver: bridge
