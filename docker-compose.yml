version: "3.9"

services:
  # ── Flask App ──────────────────────────────────────────────
  app:
    build: .
    container_name: portfolio_app
    restart: always
    env_file: .env
    environment:
      - FLASK_ENV=production
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [portfolio_net]
    expose: ["8000"]

  # ── Celery Worker ─────────────────────────────────────────
  celery:
    build: .
    container_name: portfolio_celery
    restart: always
    env_file: .env
    command: celery -A wsgi:celery_app worker --loglevel=info --concurrency=4
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on: [app, redis, db]
    networks: [portfolio_net]

  # ── Celery Beat (scheduler) ───────────────────────────────
  celery_beat:
    build: .
    container_name: portfolio_beat
    restart: always
    env_file: .env
    command: celery -A wsgi:celery_app beat --loglevel=info
    depends_on: [celery]
    networks: [portfolio_net]

  # ── MySQL ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: portfolio_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s; timeout: 5s; retries: 5
    networks: [portfolio_net]
    expose: ["3306"]

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s; timeout: 3s; retries: 5
    networks: [portfolio_net]
    expose: ["6379"]

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/portfolio.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - ./app/static:/app/static:ro
      - uploads:/app/uploads:ro
    depends_on: [app]
    networks: [portfolio_net]

  # ── Certbot ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: portfolio_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  mysql_data: {}
  redis_data: {}
  uploads:    {}
  logs:       {}
  certbot_www:{}
  certbot_conf:{}

networks:
  portfolio_net:
    driver: bridge
