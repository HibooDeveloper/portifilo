# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hibbo.tech www.hibbo.tech;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name hibbo.tech www.hibbo.tech;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/hibbo.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hibbo.tech/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://challenges.cloudflare.com;" always;

    # File upload limit
    client_max_body_size 10M;

    # Static files — long cache
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 20;
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
    }

    # Login endpoint — stricter limit
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://app:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://app:8000;
        access_log off;
    }

    # SPA fallback
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
